<style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --sand:#ddeef7; --cream:#f2f9f4; --charcoal:#1e3a2f; --warm:#4a7fa5;
      --gold:#5db87a; --green:#3a8f5e; --red:#b94040; --amber:#4a7fa5;
      --green-bg:#e8f5ee; --red-bg:#faeaea; --amber-bg:#ddeef7; --border:#b8d9c8;
    }
    body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--charcoal); min-height:100vh; }

    /* --- HEADER MEJORADO PARA MÓVIL --- */
    header { 
      background:var(--charcoal); 
      color:#fff; 
      padding:0.5rem 1rem; 
      display:flex; 
      flex-direction: column; /* Apilado en móvil por defecto */
      align-items:center; 
      gap: 0.8rem;
      position:sticky; 
      top:0; 
      z-index:100; 
      box-shadow:0 2px 12px rgba(0,0,0,.25); 
    }

    .logo { 
      font-family:'Cormorant Garamond',serif; 
      font-size:1.6rem; 
      font-weight:300; 
      letter-spacing:.1em; 
      text-align: center;
    }
    
    .nav-container {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap; /* Permite que los botones bajen si no caben */
    }

    .nav-link, #sync-btn { 
      background:none; 
      border:1.5px solid var(--gold); 
      color:var(--gold); 
      padding:.4rem .8rem; 
      border-radius:20px; 
      font-family:'DM Sans',sans-serif; 
      font-size:.75rem; 
      cursor:pointer; 
      display:flex; 
      align-items:center; 
      gap:.3rem; 
      text-decoration:none; 
      transition:all .2s; 
    }

    .nav-link:hover, #sync-btn:hover { background:var(--gold); color:#fff; }
    #sync-btn { background: var(--gold); color: white; border-color: var(--gold); } /* Destacar actualizar */

    /* Estilos para pantallas grandes (PC) */
    @media(min-width: 850px) {
      header { 
        flex-direction: row; 
        justify-content: space-between; 
        height: 64px; 
        padding: 0 2rem;
      }
      .nav-container { width: auto; }
      .logo { font-size: 1.9rem; }
    }

    /* Estilos para pantallas pequeñas (Celulares) */
    @media(max-width: 500px) {
      .logo span { display: none; } /* Ocultar "Real del 14" en móviles */
      .nav-link span { display: none; } /* Ocultar texto de botones, dejar solo iconos si es muy pequeño */
      .nav-link { padding: 0.5rem; border-radius: 50%; width: 36px; height: 36px; justify-content: center; }
      #sync-btn { padding: 0.5rem 1rem; border-radius: 20px; width: auto; } /* Mantener texto en Actualizar */
      #sync-btn span { display: inline; }
    }

    #sync-btn svg { width:14px; height:14px; }
    #sync-btn.loading svg { animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    /* --- FIN HEADER --- */

    main { max-width:1100px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }
    /* ... resto de tus estilos ... */
  </style>
</head>
<body>

<header>
  <div class="logo">Quinta Bugambilia <span>· Real del 14</span></div>
  <div class="nav-container">
    <a href="ventas.html" class="nav-link" title="Ventas">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Ventas</span>
    </a>
    <a href="contrato_hospedaje.html" class="nav-link" title="Contratos">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>Contratos</span>
    </a>
    <a href="rentas.html" class="nav-link" title="Rentas">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Rentas</span>
    </a>
    <button id="sync-btn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      <span>Actualizar</span>
    </button>
  </div>
</header>
