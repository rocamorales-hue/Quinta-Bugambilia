<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Quinta Bugambilia – Disponibilidad 2026</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand: #ddeef7; --cream: #f2f9f4; --charcoal: #1e3a2f; --warm: #4a7fa5;
      --gold: #5db87a; --green: #3a8f5e; --red: #b94040; --amber: #4a7fa5;
      --green-bg: #e8f5ee; --red-bg: #faeaea; --amber-bg: #ddeef7; --border: #b8d9c8;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; overflow-x: hidden; }

    header { 
      background: var(--charcoal); color: #fff; padding: 0.8rem 1rem; 
      display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
      position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.25); 
    }

    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; letter-spacing: .1em; text-align: center; }
    .logo span { color: var(--gold); opacity: 0.8; font-size: 1rem; }
    
    .nav-container { display: flex; gap: 0.5rem; width: 100%; justify-content: center; flex-wrap: wrap; }

    .nav-link, #sync-btn { 
      background: none; border: 1.5px solid var(--gold); color: var(--gold); padding: .5rem 0.8rem; 
      border-radius: 20px; font-size: .72rem; cursor: pointer; display: flex; align-items: center; 
      gap: .3rem; text-decoration: none; transition: all .2s; 
    }

    .nav-link:hover, #sync-btn:hover { background: var(--gold); color: #fff; }
    #sync-btn { background: var(--gold); color: white; border-color: var(--gold); }

    @media(min-width: 850px) {
      header { flex-direction: row; justify-content: space-between; height: 64px; padding: 0 2rem; }
      .nav-container { width: auto; }
      .logo { font-size: 1.9rem; }
    }

    @media(max-width: 500px) {
      .logo span { display: none; }
      .nav-link span { display: none; }
      .nav-link { padding: 0.6rem; border-radius: 50%; width: 40px; height: 40px; justify-content: center; }
    }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem 4rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; margin-bottom: .3rem; text-align: center; }
    .subtitle { color: var(--warm); font-size: .88rem; margin-bottom: 2rem; text-align: center; }

    .legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; padding: 0.8rem; background: var(--sand); border-radius: 10px; border: 1px solid var(--border); justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot-free{background:var(--green);} .dot-busy{background:var(--red);} .dot-partial{background:var(--amber);}

    .year-nav { display: flex; gap: .4rem; overflow-x: auto; padding-bottom: 1rem; margin-bottom: 1.5rem; scrollbar-width: none; }
    .year-nav::-webkit-scrollbar { display: none; }
    .month-btn { flex-shrink: 0; background: none; border: 1.5px solid var(--border); padding: .4rem 0.9rem; border-radius: 20px; font-size: .75rem; cursor: pointer; color: var(--warm); }
    .month-btn.active { background: var(--charcoal); border-color: var(--charcoal); color: #fff; }

    /* CONTENEDOR FLUIDO */
    #calendar-wrap { 
      background: #fff; 
      border-radius: 14px; 
      border: 1px solid var(--border); 
      overflow-x: auto; 
      box-shadow: 0 4px 24px rgba(0,0,0,.06); 
    }

    .cal-header { background: var(--charcoal); color: #fff; padding: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .cal-month-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; text-transform: capitalize; }
    .cal-stats { display: flex; gap: 0.8rem; }
    .stat { text-align: center; min-width: 60px; }
    .stat-num { font-size: 1.2rem; font-weight: 500; }
    .stat-lbl { font-size: .55rem; opacity: .8; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1; }
    .stat-num.s-green{color:#7ed4a0;} .stat-num.s-red{color:#f08080;} .stat-num.s-amber{color:#f5c06a;}

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); min-width: 300px; }
    .cal-day-name { background: var(--sand); padding: .5rem 0; text-align: center; font-size: .65rem; font-weight: 500; text-transform: uppercase; color: var(--warm); border-bottom: 1px solid var(--border); }

    .cal-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 85px; padding: .3rem; position: relative; }
    .cal-cell:nth-child(7n){border-right:none;}
    .cal-cell.empty{background:var(--sand);opacity:.4;}
    .cal-cell.free{background:var(--green-bg);}
    .cal-cell.busy{background:var(--red-bg);}
    .cal-cell.partial{background:var(--amber-bg);}
    .cal-cell.today .day-num { background: var(--gold); color: #fff; border-radius: 50%; }

    .day-num { font-size: .75rem; font-weight: 500; color: var(--charcoal); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: .2rem; }
    .status-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .status-bar.free{background:var(--green);} .status-bar.busy{background:var(--red);} .status-bar.partial{background:var(--amber);}

    .session-tags { display: flex; flex-direction: column; gap: 2px; }
    .session-tag { 
      font-size: .55rem; 
      padding: 1px 4px; 
      border-radius: 4px; 
      font-weight: 500; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .tag-busy { background: rgba(185, 64, 64, .1); color: var(--red); border: 1px solid rgba(185,64,64,0.1); }
    .tag-free { background: rgba(58, 143, 94, .1); color: var(--green); border: 1px solid rgba(58,143,94,0.1); }

    footer { text-align: center; padding: 2rem; font-size: .75rem; color: var(--warm); border-top: 1px solid var(--border); }

    @media(max-width: 600px) {
      .cal-cell { min-height: 70px; padding: 2px; }
      .cal-month-title { font-size: 1.2rem; }
      .stat-num { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Quinta Bugambilia <span>· Real del 14</span></div>
  <div class="nav-container">
    <a href="ventas.html" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Ventas</span>
    </a>
    <a href="contrato_hospedaje.html" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>Contratos</span>
    </a>
    <a href="contrato_evento.html" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line></svg>
      <span>Evento</span>
    </a>
    <a href="rentas.html" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Rentas</span>
    </a>
    <button id="sync-btn" onclick="loadData()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10"/></svg>
      <span>Actualizar</span>
    </button>
  </div>
</header>

<main>
  <h1>Disponibilidad 2026</h1>
  <p class="subtitle">Calendario en tiempo real</p>

  <div class="legend">
    <div class="legend-item"><div class="dot dot-free"></div> Libre</div>
    <div class="legend-item"><div class="dot dot-partial"></div> Parcial</div>
    <div class="legend-item"><div class="dot dot-busy"></div> No Disponible</div>
  </div>

  <nav class="year-nav" id="month-nav"></nav>

  <div id="calendar-wrap">
    <div style="text-align:center; padding:3rem; color:var(--warm);">Cargando disponibilidad...</div>
  </div>
</main>

<footer> Rentas Quinta Bugambilia 2026 </footer>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo8m2mzpqf5Z_Znr_F6ZRDOqbZJ7zXuRzIkKkZHjU5A8ZvD3ejb7t6Pq_6YR28j12cAQCqQCqVFSve/pub?gid=0&single=true&output=csv';
const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAY_NAMES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
let calendarData = {};
let currentMonth = new Date().getMonth();
const YEAR = 2026;

function parseCSVLine(line) {
  const cols = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') inQ = !inQ;
    else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
    else cur += ch;
  }
  cols.push(cur.trim());
  return cols;
}

function parseDate(fechaRaw) {
  if (!fechaRaw) return null;
  let m = fechaRaw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
  const serial = parseInt(fechaRaw);
  if (!isNaN(serial) && serial > 40000) return new Date(Date.UTC(1899,11,30) + serial * 86400000);
  return new Date(fechaRaw);
}

function parseCSV(text) {
  const result = {};
  const lines = text.split('\n');
  for (const line of lines) {
    const row = parseCSVLine(line);
    if (row.length < 2) continue;
    const dateObj = parseDate(row[0]);
    if (!dateObj || isNaN(dateObj.getTime()) || dateObj.getFullYear() !== YEAR) continue;
    const monthKey = `${YEAR}-${String(dateObj.getMonth()+1).padStart(2,'0')}`;
    const dayKey = `${monthKey}-${String(dateObj.getDate()).padStart(2,'0')}`;
    if (!result[monthKey]) result[monthKey] = {};
    result[monthKey][dayKey] = { manana: row[2], tarde: row[3] };
  }
  return result;
}

function getStatus(dayData) {
  if (!dayData) return 'free';
  const m = (dayData.manana || '').toLowerCase().includes('ocup');
  const t = (dayData.tarde || '').toLowerCase().includes('ocup');
  if (m && t) return 'busy';
  if (m || t) return 'partial';
  return 'free';
}

function sessionClass(val) {
  return (val||'').toLowerCase().includes('ocup') ? 'tag-busy' : 'tag-free';
}

async function loadData() {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    calendarData = parseCSV(text);
    renderNav();
    renderCalendar(currentMonth);
  } catch(e) {
    document.getElementById('calendar-wrap').innerHTML = '<div style="padding:2rem;text-align:center;color:red;">Error al cargar datos.</div>';
  }
}

function renderNav() {
  const nav = document.getElementById('month-nav');
  nav.innerHTML = '';
  MONTH_NAMES.forEach((name, m) => {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (m === currentMonth ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => { currentMonth = m; renderNav(); renderCalendar(m); };
    nav.appendChild(btn);
  });
}

function renderCalendar(month) {
  const wrap = document.getElementById('calendar-wrap');
  const monthKey = `${YEAR}-${String(month + 1).padStart(2, '0')}`;
  const monthData = calendarData[monthKey] || {};
  const daysInMonth = new Date(YEAR, month + 1, 0).getDate();
  const firstWD = new Date(YEAR, month, 1).getDay();
  const today = new Date();

  let free = 0, busy = 0, partial = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const dk = `${monthKey}-${String(d).padStart(2, '0')}`;
    const st = getStatus(monthData[dk]);
    if (st === 'busy') busy++; else if (st === 'partial') partial++; else free++;
  }

  let html = `<div class="cal-header"><div class="cal-month-title">${MONTH_NAMES[month]}</div><div class="cal-stats"><div class="stat"><div class="stat-num s-green">${free}</div><div class="stat-lbl">Disponible</div></div><div class="stat"><div class="stat-num s-amber">${partial}</div><div class="stat-lbl">Parcial</div></div><div class="stat"><div class="stat-num s-red">${busy}</div><div class="stat-lbl">No Disp.</div></div></div></div><div class="cal-grid">`;

  DAY_NAMES.forEach(d => html += `<div class="cal-day-name">${d}</div>`);
  for (let i = 0; i < firstWD; i++) html += `<div class="cal-cell empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dk = `${monthKey}-${String(d).padStart(2, '0')}`;
    const data = monthData[dk];
    const status = getStatus(data);
    const isToday = today.getFullYear() === YEAR && today.getMonth() === month && today.getDate() === d;
    
    let tags = '';
    if (data) {
      if (data.manana) tags += `<span class="session-tag ${sessionClass(data.manana)}">☀️ ${data.manana}</span>`;
      if (data.tarde) tags += `<span class="session-tag ${sessionClass(data.tarde)}">🌙 ${data.tarde}</span>`;
    }

    html += `<div class="cal-cell ${status}${isToday ? ' today' : ''}">
      <div class="status-bar ${status}"></div>
      <div class="day-num">${d}</div>
      <div class="session-tags">${tags}</div>
    </div>`;
  }
  wrap.innerHTML = html + '</div>';
}

loadData();
</script>
</body>
</html>
