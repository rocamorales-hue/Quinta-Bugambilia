<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Quinta Bugambilia – Disponibilidad 2026</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand: #ddeef7;
      --cream: #f2f9f4;
      --charcoal: #1e3a2f;
      --warm: #4a7fa5;
      --gold: #5db87a;
      --green: #3a8f5e;
      --red: #b94040;
      --amber: #4a7fa5;
      --green-bg: #e8f5ee;
      --red-bg: #faeaea;
      --amber-bg: #ddeef7;
      --border: #b8d9c8;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    header {
      background: var(--charcoal);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      height: 52px;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 300;
      letter-spacing: .08em;
      display: flex;
      align-items: baseline;
      gap: .4rem;
    }
    .logo-sub { font-size: .75rem; color: var(--gold); opacity: .85; }

    .header-actions { display: flex; gap: .4rem; align-items: center; }
    .icon-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,.75);
      cursor: pointer;
      padding: .5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      min-width: 40px;
      min-height: 40px;
    }
    .icon-btn:hover, .icon-btn:active { background: rgba(255,255,255,.12); }
    .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
    .sync-btn {
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: .4rem .9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .3rem;
      transition: opacity .2s;
      min-height: 36px;
    }
    .sync-btn:active { opacity: .8; }
    .sync-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

    /* ── NAV DRAWER (hamburger) ── */
    .nav-drawer {
      background: var(--charcoal);
      border-top: 1px solid rgba(255,255,255,.1);
      overflow: hidden;
      max-height: 0;
      transition: max-height .3s ease;
    }
    .nav-drawer.open { max-height: 300px; }
    .nav-links {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: rgba(255,255,255,.08);
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .85rem 1.1rem;
      color: rgba(255,255,255,.8);
      text-decoration: none;
      font-size: .84rem;
      background: var(--charcoal);
      transition: background .15s;
    }
    .nav-link:active { background: rgba(255,255,255,.08); }
    .nav-link svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 2; flex-shrink: 0; }

    /* ── MONTH STRIP ── */
    .month-strip-wrap {
      background: #fff;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: sticky;
      top: 52px;
      z-index: 100;
    }
    .month-strip-wrap::-webkit-scrollbar { display: none; }
    .month-strip {
      display: flex;
      padding: .5rem .75rem;
      gap: .4rem;
      min-width: max-content;
    }
    .month-pill {
      background: none;
      border: 1.5px solid var(--border);
      padding: .35rem .85rem;
      border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      cursor: pointer;
      color: var(--warm);
      white-space: nowrap;
      transition: all .15s;
      min-height: 36px;
    }
    .month-pill.active {
      background: var(--charcoal);
      border-color: var(--charcoal);
      color: #fff;
    }

    /* ── MAIN ── */
    main { max-width: 700px; margin: 0 auto; padding: 1rem .75rem calc(2rem + var(--safe-bottom)); }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      margin-bottom: .2rem;
    }
    .subtitle { color: var(--warm); font-size: .82rem; margin-bottom: 1rem; }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      padding: .7rem 1rem;
      background: var(--sand);
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 1rem;
      align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .78rem; }
    .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .dot-free { background: var(--green); }
    .dot-busy { background: var(--red); }
    .dot-partial { background: var(--amber); }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .5rem;
      margin-bottom: 1rem;
    }
    .stat-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .6rem .75rem;
      text-align: center;
    }
    .stat-num { font-size: 1.5rem; font-weight: 500; line-height: 1; }
    .stat-lbl { font-size: .65rem; letter-spacing: .07em; text-transform: uppercase; color: var(--warm); margin-top: 2px; }
    .s-green { color: var(--green); }
    .s-red { color: var(--red); }
    .s-amber { color: var(--amber); }

    /* ── CALENDAR GRID ── */
    .cal-wrap {
      background: #fff;
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,.05);
    }
    .cal-title-row {
      background: var(--charcoal);
      color: #fff;
      padding: .8rem 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: .08em;
      text-transform: capitalize;
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-day-name {
      background: var(--sand);
      padding: .5rem 0;
      text-align: center;
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--warm);
      border-bottom: 1px solid var(--border);
    }

    /* Mobile-first cell: compact, tap-friendly */
    .cal-cell {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      min-height: 52px;
      padding: .25rem .2rem .2rem;
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      transition: filter .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell.empty { background: var(--sand); opacity: .4; cursor: default; pointer-events: none; }
    .cal-cell.free  { background: var(--green-bg); }
    .cal-cell.busy  { background: var(--red-bg); }
    .cal-cell.partial { background: var(--amber-bg); }
    .cal-cell:active:not(.empty) { filter: brightness(.93); }

    .status-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 0; }
    .status-bar.free   { background: var(--green); }
    .status-bar.busy   { background: var(--red); }
    .status-bar.partial { background: var(--amber); }

    .day-num {
      font-size: .78rem;
      font-weight: 500;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .cal-cell.today .day-num { background: var(--gold); color: #fff; }

    /* Status indicator dots shown inside cell (replaces verbose text on mobile) */
    .cell-dots { display: flex; gap: 2px; }
    .cell-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    .cell-dot.m-free   { background: var(--green); }
    .cell-dot.m-busy   { background: var(--red); }
    .cell-dot.m-partial { background: var(--amber); }

    /* ── BOTTOM SHEET (day detail) ── */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .sheet-backdrop.visible { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 20px 20px 0 0;
      z-index: 301;
      padding: 0 1.25rem calc(1.5rem + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      max-width: 600px;
      margin: 0 auto;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: .75rem auto 1rem;
    }
    .sheet-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--charcoal);
      margin-bottom: .75rem;
      text-transform: capitalize;
    }
    .sheet-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .65rem 0;
      border-bottom: 1px solid var(--border);
    }
    .sheet-row:last-child { border-bottom: none; }
    .sheet-icon { font-size: 1.2rem; width: 28px; text-align: center; }
    .sheet-info { flex: 1; }
    .sheet-label { font-size: .72rem; color: var(--warm); text-transform: uppercase; letter-spacing: .06em; }
    .sheet-value { font-size: .92rem; font-weight: 500; margin-top: 1px; }
    .sheet-badge {
      display: inline-block;
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .badge-free    { background: var(--green); color: #fff; }
    .badge-busy    { background: var(--red); color: #fff; }
    .badge-partial { background: var(--amber); color: #fff; }

    /* ── LOADING / ERROR ── */
    #loading { text-align: center; padding: 3rem; color: var(--warm); }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-box { display: none; color: red; text-align: center; margin-bottom: 1rem; font-size: .85rem; }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: .72rem;
      color: var(--warm);
      border-top: 1px solid var(--border);
    }

    /* ── DESKTOP ENHANCEMENTS ── */
    @media (min-width: 640px) {
      .cal-cell {
        min-height: 90px;
        padding: .5rem .4rem;
        align-items: flex-start;
      }
      .day-num { font-size: .82rem; }
      .cell-dots { margin-top: auto; padding-bottom: 4px; }
    }

    @media (min-width: 700px) {
      .header-top { height: 60px; padding: 0 1.5rem; }
      .logo { font-size: 1.6rem; }
      .page-title { font-size: 2.4rem; }
    }
  </style>
</head>

<header>
  <div class="header-top">

    </div>
    <div class="header-actions">

        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>

    <div class="legend-item"><div class="dot dot-free"></div> Disponible</div>

  <div class="sheet-handle"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo8m2mzpqf5Z_Znr_F6ZRDOqbZJ7zXuRzIkKkZHjU5A8ZvD3ejb7t6Pq_6YR28j12cAQCqQCqVFSve/pub?gid=0&single=true&output=csv';

const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTH_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DAY_NAMES   = ['D','L','M','X','J','V','S'];
const DAY_FULL    = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const YEAR = 2026;

let calendarData = {};
let currentMonth = new Date().getMonth();
let navOpen = false;

function toggleNav() {
  navOpen = !navOpen;
  document.getElementById('nav-drawer').classList.toggle('open', navOpen);
}

function parseCSVLine(line) {
  const cols = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  cols.push(cur.trim());
  return cols;
}

function parseDate(fechaRaw) {
  if (!fechaRaw) return null;
  let m = fechaRaw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
  const serial = parseInt(fechaRaw);
  if (!isNaN(serial) && serial > 40000)
    return new Date(Date.UTC(1899,11,30) + serial * 86400000);
  return new Date(fechaRaw);
}

function parseCSV(text) {
  const result = {};
  for (const line of text.split('\n')) {
    const row = parseCSVLine(line);
    if (row.length < 2) continue;
    const d = parseDate(row[0]);
    if (!d || isNaN(d.getTime()) || d.getFullYear() !== YEAR) continue;
    const mo = d.getMonth() + 1, da = d.getDate();
    const mKey = `${YEAR}-${String(mo).padStart(2,'0')}`;
    const dKey = `${mKey}-${String(da).padStart(2,'0')}`;
    if (!result[mKey]) result[mKey] = {};
    result[mKey][dKey] = { manana: row[2], tarde: row[3], estado: row[4]||row[3] };
  }
  return result;
}

function getStatus(dayData) {
  if (!dayData) return 'free';
  const e = (dayData.estado||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if (e.includes('parcial')) return 'partial';
  if (e.includes('ocup')) return 'busy';
  return 'free';
}

function sessionStatus(val) {
  const v = (val||'').toLowerCase();
  if (v.includes('ocup')) return 'busy';
  if (v.includes('parcial')) return 'partial';
  return 'free';
}

async function loadData() {
  const btn = document.getElementById('sync-btn');
  btn.style.opacity = '.6';
  btn.style.pointerEvents = 'none';
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    calendarData = parseCSV(text);
    renderNav();
    renderCalendar(currentMonth);
    document.getElementById('stats-bar').style.display = 'grid';
  } catch(e) {
    const eb = document.getElementById('error-box');
    eb.style.display = 'block';
    eb.textContent = 'Error al cargar datos. Verifica tu conexión.';
    document.getElementById('calendar-wrap').innerHTML = '';
  }
  btn.style.opacity = '';
  btn.style.pointerEvents = '';
}

function scrollMonthIntoView(idx) {
  const strip = document.getElementById('month-nav');
  const pills = strip.querySelectorAll('.month-pill');
  if (pills[idx]) {
    pills[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

function renderNav() {
  const nav = document.getElementById('month-nav');
  nav.innerHTML = '';
  for (let m = 0; m < 12; m++) {
    const btn = document.createElement('button');
    btn.className = 'month-pill' + (m === currentMonth ? ' active' : '');
    btn.textContent = MONTH_SHORT[m];
    btn.onclick = () => { currentMonth = m; renderNav(); renderCalendar(m); scrollMonthIntoView(m); };
    nav.appendChild(btn);
  }
  scrollMonthIntoView(currentMonth);
}

function renderCalendar(month) {
  const wrap = document.getElementById('calendar-wrap');
  const monthKey = `${YEAR}-${String(month+1).padStart(2,'0')}`;
  const monthData = calendarData[monthKey] || {};
  const daysInMonth = new Date(YEAR, month+1, 0).getDate();
  const firstWD = new Date(YEAR, month, 1).getDay();
  const today = new Date();

  let free=0, busy=0, partial=0;
  for (let d=1; d<=daysInMonth; d++) {
    const dk = `${monthKey}-${String(d).padStart(2,'0')}`;
    const s = getStatus(monthData[dk]);
    if (s==='free') free++; else if (s==='busy') busy++; else partial++;
  }
  document.getElementById('s-free').textContent = free;
  document.getElementById('s-busy').textContent = busy;
  document.getElementById('s-partial').textContent = partial;

  let html = `<div class="cal-title-row">${MONTH_NAMES[month]} ${YEAR}</div><div class="cal-grid">`;
  DAY_NAMES.forEach(d => html += `<div class="cal-day-name">${d}</div>`);
  for (let i=0; i<firstWD; i++) html += `<div class="cal-cell empty"></div>`;

  for (let d=1; d<=daysInMonth; d++) {
    const dk = `${monthKey}-${String(d).padStart(2,'0')}`;
    const data = monthData[dk];
    const status = getStatus(data);
    const isToday = today.getFullYear()===YEAR && today.getMonth()===month && today.getDate()===d;
    const mSt = data ? sessionStatus(data.manana) : 'free';
    const tSt = data && data.tarde ? sessionStatus(data.tarde) : null;

    let dotsHtml = '';
    if (data && (data.manana || data.tarde)) {
      dotsHtml = `<div class="cell-dots">
        ${data.manana ? `<div class="cell-dot m-${mSt}" title="${data.manana}"></div>` : ''}
        ${tSt ? `<div class="cell-dot m-${tSt}" title="${data.tarde}"></div>` : ''}
      </div>`;
    }

    html += `<div class="cal-cell ${status}${isToday?' today':''}" 
      onclick="openSheet(${d},${month},'${monthKey}')"
      role="button" tabindex="0" aria-label="Día ${d}">
      <div class="status-bar ${status}"></div>
      <div class="day-num">${d}</div>
      ${dotsHtml}
    </div>`;
  }
  wrap.innerHTML = html + '</div>';
}

function openSheet(day, month, monthKey) {
  const data = (calendarData[monthKey]||{})[`${monthKey}-${String(day).padStart(2,'0')}`];
  const status = getStatus(data);
  const dow = new Date(YEAR, month, day).getDay();
  const labels = { free:'Libre', busy:'Ocupado', partial:'Parcial' };
  const badgeClass = { free:'badge-free', busy:'badge-busy', partial:'badge-partial' };

  document.getElementById('sheet-date').textContent =
    `${DAY_FULL[dow]}, ${day} de ${MONTH_NAMES[month]}`;

  let body = `
    <div class="sheet-row">
      <div class="sheet-icon">📋</div>
      <div class="sheet-info">
        <div class="sheet-label">Estado general</div>
        <div class="sheet-value"><span class="sheet-badge ${badgeClass[status]}">${labels[status]}</span></div>
      </div>
    </div>`;

  if (data && data.manana) {
    const st = sessionStatus(data.manana);
    body += `
      <div class="sheet-row">
        <div class="sheet-icon">☀️</div>
        <div class="sheet-info">
          <div class="sheet-label">Mañana</div>
          <div class="sheet-value"><span class="sheet-badge ${badgeClass[st]}">${data.manana}</span></div>
        </div>
      </div>`;
  }
  if (data && data.tarde) {
    const st = sessionStatus(data.tarde);
    body += `
      <div class="sheet-row">
        <div class="sheet-icon">🌙</div>
        <div class="sheet-info">
          <div class="sheet-label">Tarde / Noche</div>
          <div class="sheet-value"><span class="sheet-badge ${badgeClass[st]}">${data.tarde}</span></div>
        </div>
      </div>`;
  }
  if (!data || (!data.manana && !data.tarde)) {
    body += `<div class="sheet-row"><div class="sheet-icon">✅</div><div class="sheet-info"><div class="sheet-value" style="color:var(--green)">Disponible todo el día</div></div></div>`;
  }

  document.getElementById('sheet-body').innerHTML = body;
  document.getElementById('sheet-backdrop').classList.add('visible');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('visible');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

loadData();
</script>
</body>
</html>
