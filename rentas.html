<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> Rentas 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --sand:#ddeef7;--cream:#f2f9f4;--charcoal:#1e3a2f;--warm:#4a7fa5;
      --gold:#5db87a;--green:#3a8f5e;--red:#b94040;--amber:#4a7fa5;
      --green-bg:#e8f5ee;--red-bg:#faeaea;--amber-bg:#ddeef7;--border:#b8d9c8;
      --teal:#3a8f7e;--sky:#a8c8e0;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;}

    /* ── HEADER ── */
    header{background:var(--charcoal);color:#fff;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25);}
    .logo{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;letter-spacing:.12em;}
    .logo span{color:var(--gold);}
    .header-btns{display:flex;gap:.7rem;align-items:center;}
    .btn-outline{background:none;border:1.5px solid var(--gold);color:var(--gold);padding:.45rem 1.1rem;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:all .2s;text-decoration:none;}
    .btn-outline:hover{background:var(--gold);color:#fff;}
    .btn-outline svg{width:14px;height:14px;}
    .btn-outline.loading svg{animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    main{max-width:1200px;margin:0 auto;padding:2.5rem 1.5rem 4rem;}
    h1{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;margin-bottom:.3rem;}
    .subtitle{color:var(--warm);font-size:.88rem;margin-bottom:2rem;}

    /* ── FILTERS BAR ── */
    .filters-bar{display:flex;gap:.8rem;flex-wrap:wrap;align-items:center;margin-bottom:2rem;padding:1rem 1.4rem;background:#fff;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04);}
    .filter-label{font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--warm);margin-right:.4rem;}
    .filter-btn{background:none;border:1.5px solid var(--border);padding:.35rem .9rem;border-radius:16px;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;color:var(--charcoal);transition:all .15s;}
    .filter-btn:hover{border-color:var(--gold);color:var(--green);}
    .filter-btn.active{background:var(--green);border-color:var(--green);color:#fff;}
    .search-input{margin-left:auto;border:1.5px solid var(--border);border-radius:20px;padding:.35rem 1rem;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--charcoal);outline:none;width:200px;transition:border-color .2s;}
    .search-input:focus{border-color:var(--gold);}

    /* ── SUMMARY BAR ── */
    .summary-bar{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
    .sum-chip{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.6rem 1.1rem;font-size:.8rem;color:var(--warm);display:flex;align-items:center;gap:.5rem;box-shadow:0 1px 4px rgba(0,0,0,.04);}
    .sum-chip strong{color:var(--charcoal);font-size:1rem;font-family:'Cormorant Garamond',serif;}

    /* ── CARDS GRID ── */
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.2rem;}
    @media(max-width:600px){.cards-grid{grid-template-columns:1fr;}}

    .renta-card{background:#fff;border-radius:16px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.05);overflow:hidden;transition:transform .2s,box-shadow .2s;position:relative;}
    .renta-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(58,143,94,.12);}
    .renta-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--green),var(--warm));}

    .card-head{padding:1.1rem 1.4rem .8rem;display:flex;justify-content:space-between;align-items:flex-start;gap:.8rem;}
    .card-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;color:var(--charcoal);line-height:1.2;}
    .card-index{font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--warm);opacity:.6;margin-top:.15rem;}

    .card-badge{flex-shrink:0;font-size:.65rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:.25rem .7rem;border-radius:20px;white-space:nowrap;}
    .badge-green{background:var(--green-bg);color:var(--green);}
    .badge-blue{background:var(--amber-bg);color:var(--warm);}
    .badge-gray{background:var(--sand);color:#6b8fa3;}

    .card-divider{height:1px;background:var(--border);margin:0 1.4rem;}

    .card-fields{padding:.9rem 1.4rem 1.1rem;display:flex;flex-direction:column;gap:.55rem;}
    .field-row{display:flex;align-items:baseline;gap:.5rem;}
    .field-key{font-size:.68rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--warm);opacity:.75;min-width:110px;flex-shrink:0;}
    .field-val{font-size:.85rem;color:var(--charcoal);}
    .field-val.money{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--green);}
    .field-val.empty{color:var(--border);font-style:italic;font-size:.78rem;}

    /* ── EMPTY / LOADING ── */
    #loading{text-align:center;padding:4rem;color:var(--warm);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem;}
    #error-box{display:none;background:var(--red-bg);border:1px solid #f5c0c0;border-radius:10px;padding:1.2rem;color:var(--red);font-size:.88rem;margin-bottom:1.5rem;}
    .empty-state{text-align:center;padding:4rem 2rem;color:var(--warm);font-size:.9rem;}
    .empty-state svg{width:48px;height:48px;opacity:.3;margin-bottom:1rem;}

    /* ── TABLE VIEW (toggle) ── */
    .view-toggle{display:flex;gap:.4rem;margin-left:auto;}
    .view-btn{background:none;border:1.5px solid var(--border);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .view-btn.active{background:var(--green);border-color:var(--green);}
    .view-btn svg{width:15px;height:15px;stroke:var(--warm);}
    .view-btn.active svg{stroke:#fff;}

    .table-wrap{display:none;background:#fff;border-radius:14px;border:1px solid var(--border);overflow:auto;box-shadow:0 2px 12px rgba(0,0,0,.05);}
    .table-wrap.visible{display:block;}
    .cards-grid.hidden{display:none;}

    table{width:100%;border-collapse:collapse;font-size:.82rem;}
    thead th{background:var(--charcoal);color:#fff;padding:.7rem 1rem;text-align:left;font-size:.68rem;font-weight:500;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;}
    tbody tr{border-bottom:1px solid var(--border);transition:background .12s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:var(--sand);}
    td{padding:.6rem 1rem;color:var(--charcoal);white-space:nowrap;}
    td.money-cell{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--green);}
    td.empty-cell{color:var(--border);font-style:italic;font-size:.75rem;}

    footer{text-align:center;padding:2rem;font-size:.75rem;color:var(--warm);border-top:1px solid var(--border);}
  </style>
</head>
<body>

<header>
  <div class="logo">Quinta Bugambilia <span style="font-size:1.1rem;opacity:.6;font-weight:300">· Real del 14</span></div>
  <div class="header-btns">
    <a href="index.html" class="btn-outline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Calendario
    </a>
    <a href="ventas.html" class="btn-outline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Ventas
    </a>
    <button class="btn-outline" id="sync-btn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Actualizar
    </button>
  </div>
</header>

<main>
  <h1>Rentas 2026</h1>
  <p class="subtitle">Rentas Q.B. · Detalle de reservaciones sincronizado en tiempo real</p>

  <div id="error-box"></div>

  <div id="ui" style="display:none">
    <!-- Filters -->
    <div class="filters-bar">
      <span class="filter-label">Mes</span>
      <div id="month-filters" style="display:flex;gap:.5rem;flex-wrap:wrap;"></div>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-cards" onclick="setView('cards')" title="Tarjetas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="view-btn" id="btn-table" onclick="setView('table')" title="Tabla">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
      <input class="search-input" id="search" placeholder="Buscar…" oninput="applyFilters()"/>
    </div>

    <!-- Summary -->
    <div class="summary-bar" id="summary-bar"></div>

    <!-- Cards -->
    <div class="cards-grid" id="cards-grid"></div>

    <!-- Table -->
    <div class="table-wrap" id="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div id="loading"><div class="spinner"></div>Cargando datos…</div>
</main>

<footer>Notlify · Rentas Q.B. 2026 · Datos sincronizados con Google Sheets</footer>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo8m2mzpqf5Z_Znr_F6ZRDOqbZJ7zXuRzIkKkZHjU5A8ZvD3ejb7t6Pq_6YR28j12cAQCqQCqVFSve/pub?gid=652812646&single=true&output=csv';

// Columns D–N = indices 3–13
const COL_START = 3;
const COL_END   = 13; // inclusive

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MESES_LOW = MESES.map(m => m.toLowerCase());

let allRows = [];       // parsed row objects
let headers = [];       // column headers D–N
let activeMonth = 'all';
let currentView = 'cards';

// ── CSV parser ──────────────────────────────────────────────────────────────
function parseCSVLine(line) {
  const cols=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
    else{cur+=ch;}
  }
  cols.push(cur.trim());
  return cols;
}

function parseMoney(str) {
  if (!str) return 0;
  let s = str.replace(/\$/g,'').replace(/\s/g,'').trim();
  if (!s) return 0;
  const hasComma = s.includes(','), hasDot = s.includes('.');
  if (hasComma && hasDot) {
    if (s.lastIndexOf('.') > s.lastIndexOf(',')) s = s.replace(/,/g,'');
    else s = s.replace(/\./g,'').replace(',','.');
  } else if (hasComma) {
    const parts = s.split(',');
    s = (parts.length===2 && parts[1].length<=2) ? s.replace(',','.') : s.replace(/,/g,'');
  }
  return parseFloat(s) || 0;
}

function isMoney(str) {
  return str && (str.trim().startsWith('$') || /^\$?[\d,\.]+$/.test(str.trim()));
}

function formatMXN(val) {
  return '$' + val.toLocaleString('es-MX', {minimumFractionDigits:0, maximumFractionDigits:0});
}

// ── Detect which month a row belongs to (scanning all cols) ─────────────────
function detectMonth(row) {
  for (const cell of row) {
    const c = (cell||'').trim().toLowerCase().replace(/^\d+\.\s*/,'');
    const hit = MESES_LOW.find(m => c === m || c.startsWith(m + ' ') || c.startsWith(m + ','));
    if (hit) return MESES[MESES_LOW.indexOf(hit)];
    // Date pattern DD/MM/YYYY
    const dm = cell.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (dm) return MESES[parseInt(dm[2]) - 1];
    // YYYY-MM-DD
    const ym = cell.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (ym) return MESES[parseInt(ym[2]) - 1];
  }
  return null;
}

// ── Parse the full CSV ───────────────────────────────────────────────────────
function parseData(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (!lines.length) return;

  // Find header row: the row that has the most non-empty text cells in D–N
  let headerRowIdx = 0;
  let bestScore = -1;
  for (let i = 0; i < Math.min(10, lines.length); i++) {
    const row = parseCSVLine(lines[i]);
    let score = 0;
    for (let ci = COL_START; ci <= COL_END && ci < row.length; ci++) {
      const v = (row[ci]||'').trim();
      if (v && !isMoney(v) && isNaN(parseFloat(v))) score++;
    }
    if (score > bestScore) { bestScore = score; headerRowIdx = i; }
  }

  const headerRow = parseCSVLine(lines[headerRowIdx]);
  headers = [];
  for (let ci = COL_START; ci <= COL_END && ci < headerRow.length; ci++) {
    headers.push((headerRow[ci]||'').trim() || `Col ${ci+1}`);
  }

  // Parse data rows
  allRows = [];
  let currentMonth = null;

  for (let i = headerRowIdx + 1; i < lines.length; i++) {
    const row = parseCSVLine(lines[i]);

    // Detect month from any column
    const rowMonth = detectMonth(row);
    if (rowMonth) currentMonth = rowMonth;

    // Extract cols D–N
    const fields = [];
    let hasData = false;
    for (let ci = COL_START; ci <= COL_END && ci < row.length; ci++) {
      const v = (row[ci]||'').trim();
      fields.push(v);
      if (v) hasData = true;
    }
    if (!hasData) continue;

    // Skip if all fields are just numbers that look like totals without context
    const allNumeric = fields.every(f => !f || isMoney(f) || !isNaN(parseFloat(f)));
    if (allNumeric && fields.filter(Boolean).length <= 2) continue;

    allRows.push({ fields, month: currentMonth, raw: row });
  }
}

// ── Render filters ───────────────────────────────────────────────────────────
function renderFilters() {
  const months = [...new Set(allRows.map(r => r.month).filter(Boolean))];
  const container = document.getElementById('month-filters');
  container.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (activeMonth==='all'?' active':'');
  allBtn.textContent = 'Todos';
  allBtn.onclick = () => { activeMonth='all'; applyFilters(); };
  container.appendChild(allBtn);

  months.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeMonth===m?' active':'');
    btn.textContent = m;
    btn.onclick = () => { activeMonth=m; applyFilters(); };
    container.appendChild(btn);
  });
}

// ── Apply filters + search ───────────────────────────────────────────────────
function applyFilters() {
  // Update active button styles
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active',
      b.textContent === (activeMonth==='all'?'Todos':activeMonth));
  });

  const q = (document.getElementById('search').value||'').toLowerCase();
  const filtered = allRows.filter(r => {
    if (activeMonth !== 'all' && r.month !== activeMonth) return false;
    if (q && !r.fields.some(f => f.toLowerCase().includes(q))) return false;
    return true;
  });

  renderSummary(filtered);
  renderCards(filtered);
  renderTable(filtered);
}

// ── Summary bar ──────────────────────────────────────────────────────────────
function renderSummary(rows) {
  const total = rows.length;
  // Try to find money values across all rows
  let totalMoney = 0;
  rows.forEach(r => {
    r.fields.forEach(f => {
      const v = parseMoney(f);
      if (v > 1000) totalMoney += v; // threshold to avoid counting small numbers
    });
  });

  const months = new Set(rows.map(r=>r.month).filter(Boolean));
  let html = `<div class="sum-chip"><strong>${total}</strong> registros</div>`;
  if (months.size > 0) html += `<div class="sum-chip"><strong>${months.size}</strong> ${months.size===1?'mes':'meses'}</div>`;
  if (totalMoney > 0) html += `<div class="sum-chip">Total: <strong>${formatMXN(totalMoney)}</strong></div>`;
  document.getElementById('summary-bar').innerHTML = html;
}

// ── Render cards ─────────────────────────────────────────────────────────────
function renderCards(rows) {
  const grid = document.getElementById('cards-grid');
  if (!rows.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <div>Sin resultados</div></div>`;
    return;
  }

  grid.innerHTML = rows.map((r, idx) => {
    // First non-empty field = "name/title"
    const nameIdx = r.fields.findIndex(f => f && !isMoney(f) && isNaN(parseFloat(f)));
    const name = nameIdx >= 0 ? r.fields[nameIdx] : (r.fields[0] || `Renta ${idx+1}`);

    // Badge: month
    const badgeHtml = r.month
      ? `<span class="card-badge badge-green">${r.month}</span>`
      : '';

    // Fields (skip the name field to avoid duplication)
    const fieldRows = headers.map((h, i) => {
      const val = r.fields[i] || '';
      if (i === nameIdx) return ''; // already shown as title
      if (!val) return `<div class="field-row"><span class="field-key">${h}</span><span class="field-val empty">—</span></div>`;
      const moneyVal = parseMoney(val);
      const valClass = (moneyVal > 0 && isMoney(val)) ? 'money' : '';
      const display = (moneyVal > 0 && isMoney(val)) ? formatMXN(moneyVal) : val;
      return `<div class="field-row">
        <span class="field-key">${h}</span>
        <span class="field-val ${valClass}">${display}</span>
      </div>`;
    }).join('');

    return `<div class="renta-card" style="animation:fadeUp .4s ease ${idx*0.04}s both">
      <div class="card-head">
        <div>
          <div class="card-name">${name}</div>
          <div class="card-index"># ${idx+1}</div>
        </div>
        ${badgeHtml}
      </div>
      <div class="card-divider"></div>
      <div class="card-fields">${fieldRows}</div>
    </div>`;
  }).join('');
}

// ── Render table ─────────────────────────────────────────────────────────────
function renderTable(rows) {
  const thead = document.getElementById('table-head');
  const tbody = document.getElementById('table-body');

  thead.innerHTML = `<tr><th>#</th><th>Mes</th>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>`;

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="${headers.length+2}" style="text-align:center;padding:2rem;color:var(--warm)">Sin resultados</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map((r, idx) => {
    const cells = r.fields.map((f,i) => {
      if (!f) return `<td class="empty-cell">—</td>`;
      const moneyVal = parseMoney(f);
      if (moneyVal > 0 && isMoney(f)) return `<td class="money-cell">${formatMXN(moneyVal)}</td>`;
      return `<td>${f}</td>`;
    }).join('');
    return `<tr><td style="color:var(--warm);font-size:.75rem">${idx+1}</td><td>${r.month||'—'}</td>${cells}</tr>`;
  }).join('');
}

// ── View toggle ──────────────────────────────────────────────────────────────
function setView(view) {
  currentView = view;
  document.getElementById('cards-grid').classList.toggle('hidden', view==='table');
  document.getElementById('table-wrap').classList.toggle('visible', view==='table');
  document.getElementById('btn-cards').classList.toggle('active', view==='cards');
  document.getElementById('btn-table').classList.toggle('active', view==='table');
}

// ── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('sync-btn');
  btn.classList.add('loading');
  document.getElementById('error-box').style.display='none';
  document.getElementById('loading').style.display='block';
  document.getElementById('ui').style.display='none';

  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    parseData(text);

    if (!allRows.length) throw new Error('No se encontraron datos en la pestaña. Verifica que esté publicada.');

    renderFilters();
    applyFilters();
    document.getElementById('ui').style.display='block';
    document.getElementById('loading').style.display='none';
  } catch(e) {
    document.getElementById('error-box').style.display='block';
    document.getElementById('error-box').textContent='⚠️ Error al cargar: ' + e.message;
    document.getElementById('loading').style.display='none';
  }
  btn.classList.remove('loading');
}

// ── Fade animation ───────────────────────────────────────────────────────────
const style = document.createElement('style');
style.textContent = `@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}`;
document.head.appendChild(style);

loadData();
</script>
</body>
</html>
