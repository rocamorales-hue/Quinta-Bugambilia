<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Quinta Bugambilia – Rentas 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ==========================================================================
       RESET & VARIABLES GLOBALES (Alineado con Ventas)
       ========================================================================== */
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --sand: #ddeef7; 
      --cream: #f2f9f4; 
      --charcoal: #1e3a2f; 
      --warm: #4a7fa5;
      --gold: #5db87a; 
      --green: #3a8f5e; 
      --red: #b94040; 
      --amber: #4a7fa5;
      --green-bg: #e8f5ee; 
      --red-bg: #faeaea; 
      --amber-bg: #ddeef7; 
      --border: #b8d9c8;
    }

    body { 
      font-family: 'DM Sans', sans-serif; 
      background: var(--cream); 
      color: var(--charcoal); 
      min-height: 100vh; 
      overflow-x: hidden; 
    }

    /* ==========================================================================
       HEADER & NAVIGATION (Estilo Blur Premium - Mobile First)
       ========================================================================== */
    header { 
      background: rgba(30, 58, 47, 0.96); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px);
      color: #fff; 
      padding: 0.9rem 0.8rem; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 0.8rem;
      position: sticky; 
      top: 0; 
      z-index: 100; 
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .logo { 
      font-family: 'Cormorant Garamond', serif; 
      font-size: 1.4rem; 
      font-weight: 400; 
      letter-spacing: .05em; 
      text-align: center;
    }
    .logo span { 
      color: var(--gold); 
      opacity: 0.9; 
      font-size: 0.8rem; 
      font-family: 'DM Sans', sans-serif;
      margin-left: 0.3rem;
      font-weight: 300;
    }
    
    .nav-container { 
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem; 
      width: 100%; 
    }

    .nav-link, .btn-sync { 
      background: rgba(255, 255, 255, 0.05); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      color: #fff; 
      padding: 0.7rem 0.4rem; 
      border-radius: 10px; 
      font-size: 0.78rem; 
      font-weight: 500;
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 0.3rem; 
      text-decoration: none; 
      transition: all 0.2s ease-in-out; 
      -webkit-tap-highlight-color: transparent; 
    }

    .nav-link svg, .btn-sync svg {
      opacity: 0.85;
      flex-shrink: 0;
      width: 13px;
      height: 13px;
    }

    .btn-sync { 
      background: var(--gold); 
      color: #1e3a2f; 
      border: none;
      font-weight: 600;
    }

    .nav-link:active { background: rgba(255, 255, 255, 0.15); }
    .btn-sync:active { background: #4ca667; }

    .btn-sync.loading svg { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ==========================================================================
       MAIN CONTENT
       ========================================================================== */
    main { max-width: 1100px; margin: 0 auto; padding: 1rem 0.6rem 3rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; margin-bottom: .2rem; text-align: center; }
    .subtitle { color: var(--warm); font-size: .8rem; margin-bottom: 1.2rem; text-align: center; }

    #error-box {
      display: none;
      background: var(--red-bg);
      border: 1px solid rgba(185, 64, 64, 0.2);
      border-radius: 10px;
      padding: 1rem;
      color: var(--red);
      font-size: .82rem;
      margin-bottom: 1.2rem;
      text-align: center;
      line-height: 1.4;
    }

    /* ── FILTERS BAR ── */
    .filters-bar {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.2rem;
      padding: 0.9rem;
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(0,0,0,.02);
    }
    
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: .65rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--warm);
    }

    #month-filters {
      display: flex;
      gap: .35rem;
      flex-wrap: wrap;
      flex: 1;
    }

    .filter-btn {
      background: var(--cream);
      border: 1px solid var(--border);
      padding: .4rem .7rem;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: .75rem;
      cursor: pointer;
      color: var(--charcoal);
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn.active { background: var(--green); border-color: var(--green); color: #fff; font-weight: 500; }
    
    .search-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .6rem .9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      color: var(--charcoal);
      outline: none;
      background: var(--cream);
      -webkit-appearance: none;
    }
    .search-input:focus { border-color: var(--green); background: #fff; }

    /* ── METRICS BAR (Cards apiladas inteligentemente en celular) ── */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }
    .sum-chip {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .7rem;
      font-size: .7rem;
      color: var(--warm);
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 16px rgba(0,0,0,.01);
    }
    .sum-chip strong {
      color: var(--charcoal);
      font-size: 1.15rem;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      margin-top: 0.1rem;
    }

    /* ── CARDS GRID ── */
    .cards-grid { display: grid; grid-template-columns: 1fr; gap: 0.8rem; }
    .cards-grid.hidden { display: none; }

    .renta-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(0,0,0,.02);
      overflow: hidden;
      position: relative;
    }
    .renta-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--green), var(--gold));
    }

    .card-head { padding: 0.9rem 1rem 0.6rem; display: flex; justify-content: space-between; align-items: flex-start; gap: .4rem; }
    .card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--charcoal); line-height: 1.2; }
    .card-index { font-size: .65rem; color: var(--warm); opacity: .7; margin-top: .1rem; }

    .card-badge { font-size: .6rem; font-weight: 600; text-transform: uppercase; padding: .2rem .5rem; border-radius: 7px; white-space: nowrap; }
    .badge-green { background: var(--green-bg); color: var(--green); }

    .card-divider { height: 1px; background: var(--cream); margin: 0 1rem; }
    .card-fields { padding: 0.6rem 1rem 0.9rem; display: flex; flex-direction: column; gap: .4rem; }
    .field-row { display: flex; align-items: baseline; justify-content: space-between; }
    .field-key { font-size: .65rem; font-weight: 600; text-transform: uppercase; color: var(--warm); opacity: .8; padding-right: 0.5rem; }
    .field-val { font-size: .8rem; color: var(--charcoal); text-align: right; }
    .field-val.money { font-family: 'Cormorant Garamond', serif; font-size: .95rem; color: var(--green); font-weight: 600; }
    .field-val.empty { color: var(--border); font-style: italic; }

    /* ── VIEW TOGGLE ── */
    .view-toggle { display: flex; gap: .3rem; margin-left: auto; }
    .view-btn { background: var(--cream); border: 1px solid var(--border); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .view-btn.active { background: var(--green); border-color: var(--green); }
    .view-btn svg { width: 14px; height: 14px; stroke: var(--warm); }
    .view-btn.active svg { stroke: #fff; }

    /* ── TABLE VIEW (Desplazamiento táctil lateral fluido) ── */
    .table-wrap { display: none; background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-wrap.visible { display: block; }
    table { width: 100%; border-collapse: collapse; font-size: .78rem; }
    thead th { background: var(--charcoal); color: #fff; padding: .6rem .7rem; text-align: left; font-size: .65rem; font-weight: 500; text-transform: uppercase; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--cream); }
    td { padding: .6rem .7rem; color: var(--charcoal); white-space: nowrap; }
    td.money-cell { font-family: 'Cormorant Garamond', serif; font-size: .9rem; color: var(--green); font-weight: 600; }
    td.empty-cell { color: var(--border); font-style: italic; }

    /* LOADER & ESTADOS */
    #loading { text-align: center; padding: 3rem 1rem; color: var(--warm); font-size: 0.85rem; }
    .spinner { width: 26px; height: 26px; border: 2.5px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 0.6rem; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--warm); font-size: .8rem; }

    footer { text-align: center; padding: 1.2rem; font-size: .65rem; color: var(--warm); border-top: 1px solid var(--border); margin-top: 2rem; }

    /* ==========================================================================
       MEDIA QUERY: DESKTOP & TABLETS
       ========================================================================== */
    @media(min-width: 768px) {
      header { flex-direction: row; justify-content: space-between; padding: 0 2rem; height: 65px; }
      .nav-container { display: flex; width: auto; gap: 0.5rem; }
      .nav-link, .btn-sync { padding: 0.65rem 1rem; font-size: .8rem; }
      .logo { font-size: 1.6rem; }
      main { padding: 1.5rem 1rem 4rem; }
      h1 { font-size: 2.2rem; }
      .filters-bar { flex-direction: row; align-items: center; padding: 1rem; gap: 1rem; }
      .search-input { width: 240px; margin-left: auto; }
      .summary-bar { grid-template-columns: repeat(4, 1fr); gap: 1rem; }
      .cards-grid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Quinta Bugambilia <span>· Real del 14</span></div>
  <div class="nav-container">
    <a href="index.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Calendario</span>
    </a>
    <a href="ventas.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Ventas</span>
    </a>
    <button class="btn-sync" id="sync-btn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      <span>Actualizar</span>
    </button>
  </div>
</header>

<main>
  <h1>Rentas 2026</h1>
  <p class="subtitle">Detalle de reservaciones en tiempo real</p>

  <div id="error-box"></div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Sincronizando datos de reservación...</p>
  </div>

  <div id="ui" style="display:none">
    <div class="filters-bar">
      <div class="filter-group">
        <span class="filter-label">Mes:</span>
        <div id="month-filters"></div>
      </div>
      <input type="text" id="search" class="search-input" placeholder="Buscar registros..." oninput="applyFilters()"/>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-cards" onclick="setView('cards')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="view-btn" id="btn-table" onclick="setView('table')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="summary-bar" id="summary-bar"></div>

    <div id="cards-grid" class="cards-grid"></div>

    <div id="table-wrap" class="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    
    <div id="empty-state" class="empty-state" style="display:none">
      <p>No se encontraron registros con los filtros seleccionados.</p>
    </div>
  </div>
</main>

<footer>Quinta Bugambilia 2026 · Datos sincronizados con pestaña Rentas 2026</footer>

<script>
  // REEMPLAZA ESTA URL CON TU NUEVO ENLACE DE GOOGLE SHEETS SI PERSISTE EL 404
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSo8m2mzpqf5Z_Znr_F6ZRDOqbZJ7zXuRzIkKkZHjU5A8ZvD3ejb7t6Pq_6YR28j12cAQCqQCqVFSve/pub?gid=652812646&single=true&output=csv';

  const COL_START = 3;
  const COL_END   = 13;

  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const MESES_LOW = MESES.map(m => m.toLowerCase());

  let allRows = [];       
  let headers = [];       
  let activeMonth = 'all';
  let currentView = 'cards';

  function parseCSVLine(line) {
    const cols=[]; let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    return cols;
  }

  function parseMoney(str) {
    if (!str) return 0;
    let s = str.replace(/\$/g,'').replace(/\s/g,'').trim();
    if (!s) return 0;
    const hasComma = s.includes(','), hasDot = s.includes('.');
    if (hasComma && hasDot) {
      if (s.lastIndexOf('.') > s.lastIndexOf(',')) s = s.replace(/,/g,'');
      else s = s.replace(/\./g,'').replace(',','.');
    } else if (hasComma) {
      const parts = s.split(',');
      s = (parts.length===2 && parts[1].length<=2) ? s.replace(',','.') : s.replace(/,/g,'');
    }
    return parseFloat(s) || 0;
  }

  function isMoney(str) {
    return str && (str.trim().startsWith('$') || /^\$?[\d,\.]+$/.test(str.trim()));
  }

  function formatMXN(val) {
    return '$' + val.toLocaleString('es-MX', {minimumFractionDigits:0, maximumFractionDigits:0});
  }

  function detectMonth(row) {
    for (const cell of row) {
      const c = (cell||'').trim().toLowerCase().replace(/^\d+\.\s*/,'');
      const hit = MESES_LOW.find(m => c === m || c.startsWith(m + ' ') || c.startsWith(m + ','));
      if (hit) return MESES[MESES_LOW.indexOf(hit)];
      const dm = cell.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (dm) return MESES[parseInt(dm[2]) - 1];
      const ym = cell.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (ym) return MESES[parseInt(ym[2]) - 1];
    }
    return null;
  }

  function parseData(text) {
    const lines = text.split('\n').filter(l => l.trim());
    if (!lines.length) return;

    let headerRowIdx = 0;
    let bestScore = -1;
    for (let i = 0; i < Math.min(10, lines.length); i++) {
      const row = parseCSVLine(lines[i]);
      let score = 0;
      for (let ci = COL_START; ci <= COL_END && ci < row.length; ci++) {
        const v = (row[ci]||'').trim();
        if (v && !isMoney(v) && isNaN(parseFloat(v))) score++;
      }
      if (score > bestScore) { bestScore = score; headerRowIdx = i; }
    }

    const headerRow = parseCSVLine(lines[headerRowIdx]);
    headers = [];
    for (let ci = COL_START; ci <= COL_END && ci < headerRow.length; ci++) {
      headers.push((headerRow[ci]||'').trim() || `Col ${ci+1}`);
    }

    allRows = [];
    let currentMonth = null;

    for (let i = headerRowIdx + 1; i < lines.length; i++) {
      const row = parseCSVLine(lines[i]);
      const rowMonth = detectMonth(row);
      if (rowMonth) currentMonth = rowMonth;

      const fields = [];
      let hasData = false;
      for (let ci = COL_START; ci <= COL_END && ci < row.length; ci++) {
        const v = (row[ci]||'').trim();
        fields.push(v);
        if (v) hasData = true;
      }
      if (!hasData) continue;

      const allNumeric = fields.every(f => !f || isMoney(f) || !isNaN(parseFloat(f)));
      if (allNumeric && fields.filter(Boolean).length <= 2) continue;

      allRows.push({ fields, month: currentMonth, raw: row });
    }
  }

  function renderFilters() {
    const months = [...new Set(allRows.map(r => r.month).filter(Boolean))];
    const container = document.getElementById('month-filters');
    container.innerHTML = '';

    const allBtn = document.createElement('button');
    allBtn.className = 'filter-btn' + (activeMonth==='all'?' active':'');
    allBtn.textContent = 'Todos';
    allBtn.onclick = () => { activeMonth='all'; applyFilters(); };
    container.appendChild(allBtn);

    months.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (activeMonth===m?' active':'');
      btn.textContent = m;
      btn.onclick = () => { activeMonth=m; applyFilters(); };
      container.appendChild(btn);
    });
  }

  function applyFilters() {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === (activeMonth==='all'?'Todos':activeMonth));
    });

    const q = (document.getElementById('search').value||'').toLowerCase();
    const filtered = allRows.filter(r => {
      if (activeMonth !== 'all' && r.month !== activeMonth) return false;
      if (q && !r.fields.some(f => f.toLowerCase().includes(q))) return false;
      return true;
    });

    renderSummary(filtered);
    
    if(filtered.length === 0) {
      document.getElementById('cards-grid').innerHTML = '';
      document.getElementById('table-body').innerHTML = '';
      document.getElementById('empty-state').style.display = 'block';
      return;
    }
    document.getElementById('empty-state').style.display = 'none';

    renderCards(filtered);
    renderTable(filtered);
  }

  function renderSummary(rows) {
    const total = rows.length;
    let totalMoney = 0;
    rows.forEach(r => {
      r.fields.forEach(f => {
        const v = parseMoney(f);
        if (v > 1000) totalMoney += v;
      });
    });

    const months = new Set(rows.map(r=>r.month).filter(Boolean));
    let html = `<div class="sum-chip">Eventos <strong>${total}</strong></div>`;
    if (months.size > 0) html += `<div class="sum-chip">Meses <strong>${months.size}</strong></div>`;
    if (totalMoney > 0) html += `<div class="sum-chip">Total <strong>${formatMXN(totalMoney)}</strong></div>`;
    document.getElementById('summary-bar').innerHTML = html;
  }

  function renderCards(rows) {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = rows.map((r, idx) => {
      const nameIdx = r.fields.findIndex(f => f && !isMoney(f) && isNaN(parseFloat(f)));
      const name = nameIdx >= 0 ? r.fields[nameIdx] : (r.fields[0] || `Registro ${idx+1}`);
      const badgeHtml = r.month ? `<span class="card-badge badge-green">${r.month}</span>` : '';

      const fieldRows = headers.map((h, i) => {
        const val = r.fields[i] || '';
        if (i === nameIdx) return '';
        if (!val) return `<div class="field-row"><span class="field-key">${h}</span><span class="field-val empty">—</span></div>`;
        const moneyVal = parseMoney(val);
        const valClass = (moneyVal > 0 && isMoney(val)) ? 'money' : '';
        const display = (moneyVal > 0 && isMoney(val)) ? formatMXN(moneyVal) : val;
        return `<div class="field-row">
          <span class="field-key">${h}</span>
          <span class="field-val ${valClass}">${display}</span>
        </div>`;
      }).join('');

      return `<div class="renta-card" style="animation:fadeUp .3s ease ${idx*0.02}s both">
        <div class="card-head">
          <div>
            <div class="card-name">${name}</div>
            <div class="card-index"># ${idx+1}</div>
          </div>
          ${badgeHtml}
        </div>
        <div class="card-divider"></div>
        <div class="card-fields">${fieldRows}</div>
      </div>`;
    }).join('');
  }

  function renderTable(rows) {
    const thead = document.getElementById('table-head');
    const tbody = document.getElementById('table-body');
    thead.innerHTML = `<tr><th>#</th><th>Mes</th>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>`;

    tbody.innerHTML = rows.map((r, idx) => {
      const cells = r.fields.map((f,i) => {
        if (!f) return `<td class="empty-cell">—</td>`;
        const moneyVal = parseMoney(f);
        if (moneyVal > 0 && isMoney(f)) return `<td class="money-cell">${formatMXN(moneyVal)}</td>`;
        return `<td>${f}</td>`;
      }).join('');
      return `<tr><td>${idx+1}</td><td>${r.month||'—'}</td>${cells}</tr>`;
    }).join('');
  }

  function setView(view) {
    currentView = view;
    document.getElementById('cards-grid').classList.toggle('hidden', view==='table');
    document.getElementById('table-wrap').classList.toggle('visible', view==='table');
    document.getElementById('btn-cards').classList.toggle('active', view==='cards');
    document.getElementById('btn-table').classList.toggle('active', view==='table');
  }

  async function loadData() {
    const btn = document.getElementById('sync-btn');
    btn.classList.add('loading');
    document.getElementById('error-box').style.display='none';
    document.getElementById('loading').style.display='block';
    document.getElementById('ui').style.display='none';

    try {
      const res = await fetch(CSV_URL + '&t=' + Date.now());
      if (!res.ok) {
        if(res.status === 404) {
          throw new Error('Código 404: La pestaña "Rentas 2026" cambió de enlace o fue desvinculada. Por favor ve a tu Google Sheets (Archivo > Compartir > Publicar en la Web) y copia el nuevo enlace CSV.');
        } else {
          throw new Error('HTTP Status ' + res.status);
        }
      }
      const text = await res.text();
      parseData(text);

      if (!allRows.length) throw new Error('Estructura vacía. No se pudieron procesar datos.');

      renderFilters();
      applyFilters();
      document.getElementById('ui').style.display='block';
      document.getElementById('loading').style.display='none';
    } catch(e) {
      document.getElementById('error-box').style.display='block';
      document.getElementById('error-box').innerHTML = '⚠️ <strong>Fallo en Sincronización:</strong><br>' + e.message;
      document.getElementById('loading').style.display='none';
    }
    btn.classList.remove('loading');
  }

  const style = document.createElement('style');
  style.textContent = `@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}`;
  document.head.appendChild(style);

  window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
